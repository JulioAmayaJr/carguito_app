name: carguito_app
description: Carguito app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  shared_preferences: ^2.3.2
  provider: ^6.1.5+1
  go_router: ^17.2.0
  qr_flutter: ^4.1.0
  image_picker: ^1.2.1
  mobile_scanner: ^5.2.3
  pdf: ^3.11.0
  printing: ^5.13.4
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/login/
    - assets/icons/
    - assets/images/
    - assets/packages/
    - assets/maps/
    - assets/shiping/
    - assets/delivery/
    - assets/collection/
    - assets/setting/
    - assets/bank/
